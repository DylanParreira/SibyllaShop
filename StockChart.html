<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphiques Stock - Sibylla</title>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;800&family=Electrolize:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --sib-text:#DBE8FF; --sib-muted:#9fb6d7;
            --sib-accent1:#40e0ff; --sib-accent2:#4da3ff;
            --sib-gold:#fada7d; --sib-bg:#0a0e27;
            --sib-panel:#11162e; --sib-border:rgba(255,255,255,.08);
            --sib-green:#4fffb0; --sib-red:#ff6b6b; --sib-orange:#ffb347;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Electrolize','Rajdhani',sans-serif; background:var(--sib-bg); color:var(--sib-text); min-height:100vh; }

        header { background:rgba(0,0,0,.7); backdrop-filter:blur(12px); border-bottom:1px solid rgba(64,224,255,.2); padding:0 2rem; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
        .header-left { display:flex; align-items:center; gap:1.2rem; }
        .header-logo { height:36px; }
        .header-sep  { width:1px; height:28px; background:var(--sib-border); }
        .header-title { font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:.12em; color:var(--sib-accent1); text-transform:uppercase; }
        .header-right { display:flex; gap:.7rem; align-items:center; }
        .btn-nav { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.85rem; letter-spacing:.1em; padding:.45rem 1rem; background:transparent; border:1px solid var(--sib-border); border-radius:8px; color:var(--sib-muted); cursor:pointer; text-decoration:none; transition:all .3s; }
        .btn-nav:hover { color:var(--sib-text); border-color:rgba(255,255,255,.2); }

        .page-wrapper { max-width:1200px; margin:0 auto; padding:2rem; }

        .section-title { font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--sib-text); display:flex; align-items:center; gap:.6rem; margin-bottom:1.4rem; }
        .section-title::before { content:''; display:block; width:3px; height:1.1em; background:var(--sib-accent1); border-radius:2px; }

        /* ===== CONTROLS ===== */
        .controls { background:var(--sib-panel); border:1px solid var(--sib-border); border-radius:14px; padding:1.4rem 1.6rem; margin-bottom:1.6rem; display:flex; flex-wrap:wrap; gap:1.2rem; align-items:flex-start; }

        .ctrl-group { display:flex; flex-direction:column; gap:.5rem; }
        .ctrl-label { font-family:'Rajdhani',sans-serif; font-size:.72rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--sib-muted); }

        /* Search + autocomplete */
        .resource-search-wrap { position:relative; min-width:260px; }
        .resource-search { background:rgba(255,255,255,.04); border:1px solid rgba(64,224,255,.2); border-radius:9px; padding:.6rem 1rem; font-family:'Electrolize',sans-serif; font-size:.88rem; color:var(--sib-text); outline:none; width:100%; transition:border-color .3s; }
        .resource-search:focus { border-color:var(--sib-accent1); }
        .resource-search::placeholder { color:rgba(159,182,215,.35); }
        .autocomplete-dropdown { display:none; position:absolute; top:calc(100% + .3rem); left:0; right:0; background:#0d1226; border:1px solid rgba(64,224,255,.25); border-radius:10px; max-height:220px; overflow-y:auto; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.5); }
        .autocomplete-dropdown.open { display:block; }
        .ac-item { padding:.5rem 1rem; font-size:.85rem; cursor:pointer; transition:background .15s; }
        .ac-item:hover { background:rgba(64,224,255,.08); color:var(--sib-accent1); }

        /* Selected chips */
        .chips { display:flex; flex-wrap:wrap; gap:.4rem; min-height:28px; align-items:center; }
        .chip { display:inline-flex; align-items:center; gap:.35rem; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.75rem; letter-spacing:.07em; padding:.22rem .6rem .22rem .7rem; border-radius:20px; }
        .chip-remove { background:none; border:none; cursor:pointer; font-size:.8rem; line-height:1; opacity:.7; transition:opacity .2s; padding:0; }
        .chip-remove:hover { opacity:1; }

        /* Date range */
        .range-btns { display:flex; gap:.4rem; }
        .range-btn { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.78rem; letter-spacing:.1em; padding:.35rem .85rem; border-radius:20px; border:1px solid var(--sib-border); background:transparent; color:var(--sib-muted); cursor:pointer; transition:all .2s; }
        .range-btn.active { border-color:rgba(64,224,255,.4); background:rgba(64,224,255,.08); color:var(--sib-accent1); }
        .range-btn:hover:not(.active) { color:var(--sib-text); border-color:rgba(255,255,255,.2); }

        /* Action buttons */
        .btn-snapshot { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.82rem; letter-spacing:.1em; padding:.5rem 1.1rem; background:rgba(79,255,176,.08); border:1px solid rgba(79,255,176,.3); border-radius:9px; color:var(--sib-green); cursor:pointer; transition:all .2s; }
        .btn-snapshot:hover { background:rgba(79,255,176,.16); }
        .btn-snapshot:disabled { opacity:.5; pointer-events:none; }

        /* ===== CHART PANEL ===== */
        .chart-panel { background:var(--sib-panel); border:1px solid var(--sib-border); border-radius:16px; padding:1.6rem; position:relative; min-height:400px; }
        .chart-panel canvas { max-height:420px; }

        .chart-empty { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.8rem; color:var(--sib-muted); }
        .chart-empty .ico { font-size:2.8rem; opacity:.25; }
        .chart-empty p { font-size:.88rem; }

        /* ===== LEGEND / STATS ===== */
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:.75rem; margin-top:1.4rem; }
        .stat-card { background:var(--sib-panel); border:1px solid var(--sib-border); border-radius:12px; padding:1rem 1.2rem; display:flex; flex-direction:column; gap:.35rem; }
        .stat-card-name { font-family:'Rajdhani',sans-serif; font-size:.85rem; font-weight:700; letter-spacing:.06em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .stat-card-vals { display:flex; gap:.8rem; align-items:baseline; }
        .stat-val { font-family:'Rajdhani',sans-serif; font-size:1.15rem; font-weight:800; }
        .stat-sub { font-size:.72rem; color:var(--sib-muted); }
        .stat-trend { font-size:.75rem; font-weight:700; display:flex; align-items:center; gap:.2rem; }
        .stat-trend.up   { color:var(--sib-green); }
        .stat-trend.down { color:var(--sib-red); }
        .stat-trend.flat { color:var(--sib-muted); }

        .info-note { font-size:.78rem; color:rgba(159,182,215,.4); margin-top:1rem; }

        .toast { position:fixed; bottom:2rem; right:2rem; z-index:1000; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.95rem; padding:.9rem 1.5rem; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,.4); transform:translateY(20px); opacity:0; transition:all .35s; pointer-events:none; }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast.success { background:rgba(79,255,176,.12); border:1px solid rgba(79,255,176,.4); color:var(--sib-green); }
        .toast.error   { background:rgba(255,107,107,.12); border:1px solid rgba(255,107,107,.4); color:var(--sib-red); }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img class="header-logo" src="https://raw.githubusercontent.com/DylanParreira/SibyllaShop/main/Logo-2000-copie-2-300x300.webp" alt="Sibylla">
        <div class="header-sep"></div>
        <div class="header-title">Graphiques Stock</div>
    </div>
    <div class="header-right">
        <a class="btn-nav" href="<?= appUrl ?>?page=stock-admin&token=<?= vendeurToken ?>">← Stock Admin</a>
        <a class="btn-nav" href="<?= appUrl ?>?page=stock&token=<?= vendeurToken ?>">📦 Vue membres</a>
    </div>
</header>

<div class="page-wrapper">
    <div class="section-title">Évolution des ressources</div>

    <div class="controls">
        <div class="ctrl-group" style="flex:1;min-width:260px">
            <div class="ctrl-label">Ajouter une ressource</div>
            <div class="resource-search-wrap">
                <input class="resource-search" type="text" id="resourceSearch" placeholder="Rechercher…" autocomplete="off" oninput="filterAutocomplete()" onfocus="openAc()" onblur="setTimeout(closeAc,200)">
                <div class="autocomplete-dropdown" id="acDropdown"></div>
            </div>
            <div class="chips" id="chipsContainer"></div>
        </div>

        <div class="ctrl-group">
            <div class="ctrl-label">Période</div>
            <div class="range-btns">
                <button class="range-btn" onclick="setRange(7,this)">7j</button>
                <button class="range-btn active" onclick="setRange(14,this)">14j</button>
                <button class="range-btn" onclick="setRange(30,this)">30j</button>
                <button class="range-btn" onclick="setRange(90,this)">90j</button>
            </div>
        </div>

        <div class="ctrl-group">
            <div class="ctrl-label">Snapshot</div>
            <button class="btn-snapshot" id="btnSnapshot" onclick="takeSnapshot()" title="Enregistrer l'état actuel du stock (normalement fait automatiquement chaque nuit)">
                📸 Snapshot maintenant
            </button>
        </div>

        <div class="ctrl-group">
            <div class="ctrl-label">Historique</div>
            <button class="btn-snapshot" id="btnBackfill" onclick="backfillHistory()" title="Reconstruit l'historique complet à partir du log des modifications" style="border-color:rgba(250,218,125,.35);color:var(--sib-gold);background:rgba(250,218,125,.07)">
                📜 Reconstruire depuis le log
            </button>
        </div>
    </div>

    <div class="chart-panel" id="chartPanel">
        <div class="chart-empty" id="chartEmpty">
            <div class="ico">📈</div>
            <p>Sélectionne une ou plusieurs ressources pour afficher leur historique.</p>
        </div>
        <canvas id="mainChart" style="display:none"></canvas>
    </div>

    <div class="stats-grid" id="statsGrid"></div>
    <p class="info-note" id="infoNote"></p>
</div>

<div class="toast" id="toast"></div>

<script>
    const TOKEN          = '<?= vendeurToken ?>';
    const RESOURCE_PARAM = '<?= resourceParam ?>';

    const CHART_COLORS = [
        '#40e0ff', '#4fffb0', '#fada7d', '#ff6b6b',
        '#4da3ff', '#ffb347', '#b388ff', '#69f0ae',
        '#ff80ab', '#80d8ff', '#ccff90', '#ffff8d'
    ];

    let allItemNames = [];
    let selectedResources = [];   // [{name, color}]
    let currentDays = 14;
    let chartInstance = null;
    let historyCache = {};

    window.onload = function() {
        loadItemNames();
    };

    // ===== LOAD ITEM NAMES from stock =====
    function loadItemNames() {
        google.script.run
            .withSuccessHandler(function(data) {
                var names = new Set();
                (data.categories || []).forEach(function(cat) {
                    cat.items.forEach(function(item) { names.add(item.name); });
                });
                allItemNames = Array.from(names).sort(function(a,b){ return a.localeCompare(b,'fr'); });
                filterAutocomplete();
                if (RESOURCE_PARAM) addResource(RESOURCE_PARAM);
            })
            .withFailureHandler(function(){})
            .getStock();
    }

    // ===== AUTOCOMPLETE =====
    function filterAutocomplete() {
        var q = document.getElementById('resourceSearch').value.toLowerCase().trim();
        var dd = document.getElementById('acDropdown');
        var available = allItemNames.filter(function(n) {
            if (selectedResources.some(function(r){ return r.name === n; })) return false;
            return !q || n.toLowerCase().indexOf(q) !== -1;
        }).slice(0, 30);
        if (available.length === 0) { dd.innerHTML = ''; dd.classList.remove('open'); return; }
        dd.innerHTML = available.map(function(n) {
            return '<div class="ac-item" onmousedown="addResource(\'' + esc(n) + '\')">' + esc(n) + '</div>';
        }).join('');
        dd.classList.add('open');
    }

    function openAc() { if (allItemNames.length > 0) filterAutocomplete(); }
    function closeAc() { document.getElementById('acDropdown').classList.remove('open'); }

    // ===== RESOURCE CHIPS =====
    function addResource(name) {
        if (selectedResources.some(function(r){ return r.name === name; })) return;
        var color = CHART_COLORS[selectedResources.length % CHART_COLORS.length];
        selectedResources.push({ name: name, color: color });
        document.getElementById('resourceSearch').value = '';
        renderChips();
        loadAndRender();
    }

    function removeResource(name) {
        selectedResources = selectedResources.filter(function(r){ return r.name !== name; });
        // Re-assign colors
        selectedResources.forEach(function(r, i){ r.color = CHART_COLORS[i % CHART_COLORS.length]; });
        renderChips();
        loadAndRender();
    }

    function renderChips() {
        var html = selectedResources.map(function(r) {
            return '<span class="chip" style="background:' + hexAlpha(r.color,.12) + ';border:1px solid ' + hexAlpha(r.color,.35) + ';color:' + r.color + '">' +
                esc(r.name) +
                '<button class="chip-remove" onclick="removeResource(\'' + esc(r.name) + '\')" style="color:' + r.color + '">✕</button>' +
                '</span>';
        }).join('');
        document.getElementById('chipsContainer').innerHTML = html;
    }

    // ===== DATE RANGE =====
    function setRange(days, btn) {
        currentDays = days;
        document.querySelectorAll('.range-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        loadAndRender();
    }

    // ===== LOAD HISTORY & RENDER =====
    function loadAndRender() {
        if (selectedResources.length === 0) {
            destroyChart();
            document.getElementById('statsGrid').innerHTML = '';
            document.getElementById('infoNote').textContent = '';
            return;
        }
        var names = selectedResources.map(function(r){ return r.name; });
        google.script.run
            .withSuccessHandler(function(result) {
                if (result.error) { showToast(result.error, 'error'); return; }
                historyCache = result.history || {};
                renderChart();
                renderStats();
            })
            .withFailureHandler(function(){ showToast('Erreur de chargement.', 'error'); })
            .getStockHistory(names, currentDays, TOKEN);
    }

    function renderChart() {
        var labels = buildDateLabels();
        var datasets = selectedResources.map(function(res) {
            var hist = (historyCache[res.name] || []).slice();
            hist.sort(function(a,b){
                var pa=a.date.split('/'), pb=b.date.split('/');
                return new Date(pa[2]+'-'+pa[1]+'-'+pa[0]) - new Date(pb[2]+'-'+pb[1]+'-'+pb[0]);
            });
            // Map to labels
            var dataMap = {};
            hist.forEach(function(h){ dataMap[h.date] = h.val; });
            var vals = labels.map(function(d){ return dataMap[d] !== undefined ? dataMap[d] : null; });
            return {
                label: res.name,
                data: vals,
                borderColor: res.color,
                backgroundColor: hexAlpha(res.color, .08),
                borderWidth: 2,
                pointRadius: 3,
                pointHoverRadius: 5,
                pointBackgroundColor: res.color,
                fill: true,
                tension: .35,
                spanGaps: true
            };
        });

        var hasData = datasets.some(function(d){ return d.data.some(function(v){ return v !== null; }); });
        var empty = document.getElementById('chartEmpty');
        var canvas = document.getElementById('mainChart');

        if (!hasData) {
            empty.innerHTML = '<div class="ico">📭</div><p>Aucune donnée pour cette période.<br><small>Lance un snapshot ou attends le snapshot automatique de nuit.</small></p>';
            empty.style.display = 'flex';
            canvas.style.display = 'none';
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            return;
        }

        empty.style.display = 'none';
        canvas.style.display = 'block';

        if (chartInstance) chartInstance.destroy();
        var ctx = canvas.getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: labels.map(function(d){ var p=d.split('/'); return p[0]+'/'+p[1]; }), datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        labels: {
                            color: '#9fb6d7',
                            font: { family: 'Rajdhani, sans-serif', weight: '700', size: 13 },
                            boxWidth: 14, padding: 18
                        }
                    },
                    tooltip: {
                        backgroundColor: '#0d1226',
                        borderColor: 'rgba(64,224,255,.3)',
                        borderWidth: 1,
                        titleColor: '#DBE8FF',
                        bodyColor: '#9fb6d7',
                        titleFont: { family: 'Rajdhani, sans-serif', weight: '700', size: 13 },
                        bodyFont: { family: 'Electrolize, sans-serif', size: 12 },
                        padding: 12,
                        callbacks: {
                            label: function(ctx) {
                                return ' ' + ctx.dataset.label + ' : ' + (ctx.parsed.y !== null ? ctx.parsed.y + ' cSCU' : '—');
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,.06)' },
                        ticks: { color: '#9fb6d7', font: { family: 'Electrolize, sans-serif', size: 11 } }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,.06)' },
                        ticks: { color: '#9fb6d7', font: { family: 'Electrolize, sans-serif', size: 11 },
                            callback: function(v){ return v + ' cSCU'; }
                        },
                        beginAtZero: true
                    }
                }
            }
        });
    }

    function renderStats() {
        var html = selectedResources.map(function(res) {
            var hist = (historyCache[res.name] || []).slice();
            hist.sort(function(a,b){
                var pa=a.date.split('/'), pb=b.date.split('/');
                return new Date(pa[2]+'-'+pa[1]+'-'+pa[0]) - new Date(pb[2]+'-'+pb[1]+'-'+pb[0]);
            });
            var vals = hist.map(function(h){ return h.val; });
            var last = vals.length > 0 ? vals[vals.length-1] : null;
            var first = vals.length > 0 ? vals[0] : null;
            var diff = (last !== null && first !== null) ? last - first : null;
            var trendCls = diff === null ? 'flat' : diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
            var trendTxt = diff === null ? '—' : (diff > 0 ? '▲ +' : '▼ ') + diff + ' cSCU';
            var maxVal = vals.length > 0 ? Math.max.apply(null, vals) : null;
            return '<div class="stat-card" style="border-color:' + hexAlpha(res.color,.3) + '">' +
                '<div class="stat-card-name" style="color:' + res.color + '">' + esc(res.name) + '</div>' +
                '<div class="stat-card-vals">' +
                '<span class="stat-val">' + (last !== null ? last : '—') + '</span>' +
                '<span class="stat-sub">cSCU actuel</span>' +
                '</div>' +
                (maxVal !== null ? '<span style="font-size:.72rem;color:var(--sib-muted)">Max : ' + maxVal + ' cSCU</span>' : '') +
                '<span class="stat-trend ' + trendCls + '">' + trendTxt + ' sur la période</span>' +
                '</div>';
        }).join('');
        document.getElementById('statsGrid').innerHTML = html;
        document.getElementById('infoNote').textContent = 'Données sur ' + currentDays + ' dernier' + (currentDays > 1 ? 's' : '') + ' jour' + (currentDays > 1 ? 's' : '') + ' · snapshot quotidien à 3h du matin.';
    }

    // ===== SNAPSHOT MANUAL =====
    function takeSnapshot() {
        var btn = document.getElementById('btnSnapshot');
        btn.disabled = true; btn.textContent = '⏳ Snapshot…';
        google.script.run
            .withSuccessHandler(function() {
                showToast('Snapshot enregistré.', 'success');
                btn.disabled = false; btn.textContent = '📸 Snapshot maintenant';
                if (selectedResources.length > 0) loadAndRender();
            })
            .withFailureHandler(function(){
                showToast('Erreur snapshot.', 'error');
                btn.disabled = false; btn.textContent = '📸 Snapshot maintenant';
            })
            .snapshotStockHistory();
    }

    // ===== BACKFILL FROM LOG =====
    function backfillHistory() {
        if (!confirm('Reconstruire l\'historique complet depuis le log ?\nCela effacera les données existantes dans STOCK_HISTORY et les remplacera par une reconstitution jour-par-jour basée sur le log.')) return;
        var btn = document.getElementById('btnBackfill');
        btn.disabled = true; btn.textContent = '⏳ Reconstruction…';
        google.script.run
            .withSuccessHandler(function(r) {
                btn.disabled = false; btn.textContent = '📜 Reconstruire depuis le log';
                if (r.success) {
                    showToast('Historique reconstruit — ' + r.count + ' entrées pour ' + r.items + ' ressource(s).', 'success');
                    historyCache = {};
                    if (selectedResources.length > 0) loadAndRender();
                } else {
                    showToast(r.message || 'Erreur.', 'error');
                }
            })
            .withFailureHandler(function() {
                btn.disabled = false; btn.textContent = '📜 Reconstruire depuis le log';
                showToast('Erreur serveur.', 'error');
            })
            .backfillStockHistory(TOKEN);
    }

    // ===== SETUP TRIGGER =====
    function setupTrigger() {
        google.script.run
            .withSuccessHandler(function(r) {
                if (r.success) showToast('Trigger activé (snapshot à 3h chaque jour).', 'success');
                else showToast(r.message || 'Erreur.', 'error');
            })
            .withFailureHandler(function(){ showToast('Erreur.', 'error'); })
            .setupStockHistoryTrigger(TOKEN);
    }

    // ===== HELPERS =====
    function buildDateLabels() {
        var labels = [];
        var d = new Date();
        for (var i = currentDays - 1; i >= 0; i--) {
            var dt = new Date(d); dt.setDate(d.getDate() - i);
            var dd = ('0'+dt.getDate()).slice(-2);
            var mm = ('0'+(dt.getMonth()+1)).slice(-2);
            var yy = dt.getFullYear();
            labels.push(dd+'/'+mm+'/'+yy);
        }
        return labels;
    }

    function destroyChart() {
        if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
        document.getElementById('chartEmpty').style.display = 'flex';
        document.getElementById('chartEmpty').innerHTML = '<div class="ico">📈</div><p>Sélectionne une ou plusieurs ressources pour afficher leur historique.</p>';
        document.getElementById('mainChart').style.display = 'none';
    }

    function hexAlpha(hex, alpha) {
        var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return 'rgba('+r+','+g+','+b+','+alpha+')';
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function showToast(msg, type) {
        var t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast ' + (type||'success');
        t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, 3000);
    }
</script>
</body>
</html>
