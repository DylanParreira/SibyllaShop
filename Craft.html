<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint - Sibylla</title>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;800&family=Electrolize:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --sib-text:#DBE8FF; --sib-muted:#9fb6d7;
            --sib-accent1:#40e0ff; --sib-accent2:#4da3ff;
            --sib-gold:#fada7d; --sib-bg:#0a0e27;
            --sib-panel:#11162e; --sib-border:rgba(255,255,255,.08);
            --sib-green:#4fffb0; --sib-red:#ff6b6b; --sib-orange:#ffb347;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Electrolize','Rajdhani',sans-serif; background:var(--sib-bg); color:var(--sib-text); min-height:100vh; }

        header {
            background:rgba(0,0,0,0.7); backdrop-filter:blur(12px);
            border-bottom:1px solid rgba(250,218,125,0.2);
            padding:0 2rem; height:64px;
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:100;
        }
        .header-left { display:flex; align-items:center; gap:1.2rem; }
        .header-logo { height:36px; }
        .header-sep  { width:1px; height:28px; background:var(--sib-border); }
        .header-title { font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:.12em; color:var(--sib-gold); text-transform:uppercase; }
        .header-nav { display:flex; gap:.7rem; align-items:center; }
        .nav-btn {
            font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.85rem;
            letter-spacing:.1em; padding:.45rem 1.1rem;
            border-radius:8px; cursor:pointer; text-decoration:none; transition:all .3s; border:1px solid transparent;
        }
        .nav-active { color:var(--sib-gold); background:rgba(250,218,125,.1); border-color:rgba(250,218,125,.3); }
        .nav-ghost  { color:var(--sib-muted); border-color:var(--sib-border); }
        .nav-ghost:hover { color:var(--sib-text); border-color:rgba(255,255,255,.2); }
        .nav-ext { color:var(--sib-accent1); border-color:rgba(64,224,255,.25); }
        .nav-ext:hover { background:rgba(64,224,255,.06); border-color:rgba(64,224,255,.4); }

        .page-wrapper { max-width:1100px; margin:0 auto; padding:2rem; }

        .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:.8rem; }
        .section-title {
            font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:800;
            letter-spacing:.12em; text-transform:uppercase; color:var(--sib-text);
            display:flex; align-items:center; gap:.6rem;
        }
        .section-title::before { content:''; display:block; width:3px; height:1.2em; background:var(--sib-gold); border-radius:2px; }
        .section-legend { display:flex; gap:1.2rem; font-size:.8rem; color:var(--sib-muted); align-items:center; flex-wrap:wrap; }
        .legend-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:.3rem; }

        /* ===== GRID ===== */
        /* ===== FILTRES ===== */
        .craft-filters { display:flex; flex-wrap:wrap; gap:.7rem; align-items:center; margin-bottom:1.2rem; }
        .craft-search-wrap { position:relative; flex:1; min-width:200px; }
        .craft-search { width:100%; background:rgba(255,255,255,.04); border:1px solid var(--sib-border); border-radius:10px; padding:.6rem 1rem .6rem 2.4rem; font-family:'Electrolize',sans-serif; font-size:.9rem; color:var(--sib-text); outline:none; transition:border-color .3s; }
        .craft-search:focus { border-color:rgba(64,224,255,.4); }
        .craft-search::placeholder { color:rgba(159,182,215,.3); }
        .craft-search-icon { position:absolute; left:.75rem; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none; font-size:.95rem; }
        .type-filter-btns { display:flex; flex-wrap:wrap; gap:.4rem; }
        .type-filter-btn { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.75rem; letter-spacing:.08em; padding:.3rem .8rem; border-radius:20px; cursor:pointer; border:1px solid var(--sib-border); color:var(--sib-muted); background:none; transition:all .2s; }
        .type-filter-btn:hover { border-color:rgba(64,224,255,.3); color:var(--sib-accent1); }
        .type-filter-btn.active { border-color:rgba(64,224,255,.5); color:var(--sib-accent1); background:rgba(64,224,255,.08); }

        /* ===== GRILLE CRAFT ===== */
        .craft-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1rem; }
        .craft-card {
            background:var(--sib-panel); border:1px solid var(--sib-border);
            border-radius:14px; overflow:hidden; cursor:pointer;
            transition:all .3s; position:relative;
        }
        .craft-card.craftable { border-color:rgba(79,255,176,.25); }
        .craft-card.craftable:hover { border-color:var(--sib-green); box-shadow:0 0 20px rgba(79,255,176,.15); transform:translateY(-2px); }
        .craft-card.uncraftable { cursor:pointer; }
        .craft-card.uncraftable:hover { border-color:rgba(255,107,107,.3); transform:translateY(-1px); }
        .craft-card-body { padding:1.1rem 1.2rem; }
        .craft-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem; margin-bottom:.5rem; }
        .craft-card-name { font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700; color:var(--sib-text); line-height:1.3; }
        .craft-card.craftable .craft-card-name { color:var(--sib-green); }
        .craft-type-badge { font-size:.68rem; font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:.07em; padding:.18rem .55rem; border-radius:12px; background:rgba(64,224,255,.08); border:1px solid rgba(64,224,255,.2); color:var(--sib-accent1); white-space:nowrap; flex-shrink:0; }
        .craft-status { font-family:'Rajdhani',sans-serif; font-size:.72rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:.22rem .65rem; border-radius:20px; display:inline-block; margin-bottom:.6rem; }
        .status-ok  { color:var(--sib-green); background:rgba(79,255,176,.1); border:1px solid rgba(79,255,176,.3); }
        .status-no  { color:var(--sib-red); background:rgba(255,107,107,.06); border:1px solid rgba(255,107,107,.2); }
        .recipe-preview { display:flex; flex-wrap:wrap; gap:.3rem; margin-top:.4rem; }
        .recipe-tag { font-size:.72rem; padding:.2rem .55rem; border-radius:6px; background:rgba(255,255,255,.05); border:1px solid var(--sib-border); color:var(--sib-muted); }
        .recipe-tag.ok  { color:var(--sib-green); background:rgba(79,255,176,.06); border-color:rgba(79,255,176,.2); }
        .recipe-tag.nok { color:var(--sib-red);   background:rgba(255,107,107,.06); border-color:rgba(255,107,107,.2); }
        .craft-card-time { font-size:.72rem; color:rgba(159,182,215,.45); margin-top:.5rem; }

        /* Custom Blueprint card */
        .custom-card {
            background:var(--sib-panel); border:2px dashed rgba(250,218,125,.25);
            border-radius:14px; cursor:pointer; transition:all .3s;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            min-height:200px; padding:1.5rem; text-align:center;
        }
        .custom-card:hover { border-color:var(--sib-gold); background:rgba(250,218,125,.04); }
        .custom-card-icon { font-size:2.5rem; margin-bottom:.8rem; opacity:.6; }
        .custom-card-label { font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; color:var(--sib-gold); letter-spacing:.1em; }
        .custom-card-sub { font-size:.8rem; color:var(--sib-muted); margin-top:.4rem; }

        /* ===== MES DEMANDES ===== */
        .my-requests-section { margin-top:3rem; }
        .request-row {
            background:var(--sib-panel); border:1px solid var(--sib-border);
            border-radius:10px; padding:.9rem 1.2rem; margin-bottom:.6rem;
        }
        .req-header { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
        .req-item { flex:1; font-weight:600; font-size:.92rem; }
        .req-date { font-size:.78rem; color:var(--sib-muted); }
        .req-badge {
            font-family:'Rajdhani',sans-serif; font-size:.72rem; font-weight:700;
            letter-spacing:.08em; text-transform:uppercase; padding:.2rem .6rem; border-radius:20px;
        }
        .badge-attente    { color:var(--sib-gold);   background:rgba(250,218,125,.1);  border:1px solid rgba(250,218,125,.3); }
        .badge-discussion { color:var(--sib-accent1); background:rgba(64,224,255,.1);  border:1px solid rgba(64,224,255,.3); }
        .badge-accepte    { color:var(--sib-green);  background:rgba(79,255,176,.1);   border:1px solid rgba(79,255,176,.3); }
        .badge-refuse     { color:var(--sib-red);    background:rgba(255,107,107,.1);  border:1px solid rgba(255,107,107,.3); }
        .badge-crafte     { color:var(--sib-muted);  background:rgba(255,255,255,.05); border:1px solid var(--sib-border); }

        /* Chat */
        .chat-section { margin-top:.7rem; border-top:1px solid var(--sib-border); padding-top:.7rem; }
        .chat-messages { max-height:160px; overflow-y:auto; display:flex; flex-direction:column; gap:.4rem; margin-bottom:.6rem; }
        .chat-msg { display:flex; flex-direction:column; gap:.1rem; }
        .chat-msg.from-admin { align-items:flex-start; }
        .chat-msg.from-user  { align-items:flex-end; }
        .chat-bubble {
            max-width:80%; padding:.45rem .9rem; border-radius:12px; font-size:.85rem; line-height:1.5;
        }
        .chat-msg.from-admin .chat-bubble { background:rgba(64,224,255,.08); border:1px solid rgba(64,224,255,.2); color:var(--sib-text); border-radius:4px 12px 12px 12px; }
        .chat-msg.from-user  .chat-bubble { background:rgba(250,218,125,.08); border:1px solid rgba(250,218,125,.2); color:var(--sib-text); border-radius:12px 4px 12px 12px; }
        .chat-meta { font-size:.7rem; color:var(--sib-muted); }
        .chat-input-row { display:flex; gap:.5rem; }
        .chat-input {
            flex:1; background:rgba(255,255,255,.04); border:1px solid var(--sib-border);
            border-radius:8px; padding:.5rem .8rem; font-family:'Electrolize',sans-serif;
            font-size:.85rem; color:var(--sib-text); outline:none; transition:border-color .3s;
        }
        .chat-input:focus { border-color:rgba(64,224,255,.35); }
        .btn-chat { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.8rem; letter-spacing:.08em; padding:.5rem 1rem; border-radius:8px; cursor:pointer; transition:all .2s; border:1px solid rgba(64,224,255,.3); color:var(--sib-accent1); background:rgba(64,224,255,.07); }
        .btn-chat:hover { background:rgba(64,224,255,.15); }
        .btn-cancel-req { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.75rem; letter-spacing:.08em; padding:.3rem .8rem; border-radius:8px; cursor:pointer; transition:all .2s; border:1px solid rgba(255,107,107,.3); color:var(--sib-red); background:rgba(255,107,107,.05); margin-top:.5rem; }
        .btn-cancel-req:hover { background:rgba(255,107,107,.12); }
        .btn-cancel-req:disabled { opacity:.4; pointer-events:none; }
        /* Historique volet */
        .history-toggle { display:flex; align-items:center; gap:.7rem; cursor:pointer; padding:.6rem 0; margin-top:1.5rem; border-top:1px solid var(--sib-border); color:var(--sib-muted); font-family:'Rajdhani',sans-serif; font-size:.88rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; user-select:none; }
        .history-toggle:hover { color:var(--sib-text); }
        .history-arrow { transition:transform .25s; }
        .history-arrow.open { transform:rotate(90deg); }
        .history-list { display:none; margin-top:.5rem; }
        .history-list.open { display:block; }
        .badge-annule { color:var(--sib-muted); background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); }

        /* ===== MODALS ===== */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:500; align-items:center; justify-content:center; backdrop-filter:blur(4px); overflow-y:auto; padding:1rem; }
        .modal-overlay.active { display:flex; }
        .modal-box {
            background:linear-gradient(135deg,#13193a,#0c1028); border:1px solid rgba(250,218,125,.3);
            border-radius:18px; padding:2rem; width:100%; max-width:520px;
            position:relative; box-shadow:0 20px 60px rgba(0,0,0,.6); margin:auto;
        }
        .modal-box::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:50%; height:2px; background:linear-gradient(90deg,transparent,var(--sib-gold),transparent); }
        .modal-close { position:absolute; top:1.2rem; right:1.5rem; background:none; border:none; color:var(--sib-muted); font-size:1.3rem; cursor:pointer; }
        .modal-close:hover { color:var(--sib-text); }
        .modal-title { font-family:'Rajdhani',sans-serif; font-size:1.3rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--sib-gold); margin-bottom:.4rem; }
        .modal-sub   { font-size:.85rem; color:var(--sib-muted); margin-bottom:1.4rem; }

        .form-group { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1rem; }
        .form-label { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; color:var(--sib-muted); }
        .form-input, .form-textarea {
            background:rgba(255,255,255,.04); border:1px solid rgba(250,218,125,.15);
            border-radius:9px; padding:.7rem 1rem;
            font-family:'Electrolize',sans-serif; font-size:.9rem; color:var(--sib-text); outline:none;
            transition:border-color .3s;
        }
        .form-input:focus, .form-textarea:focus { border-color:var(--sib-gold); }
        .form-input::placeholder, .form-textarea::placeholder { color:rgba(159,182,215,.35); }
        .form-textarea { resize:vertical; min-height:70px; }
        .form-input-sm { background:rgba(255,255,255,.04); border:1px solid rgba(250,218,125,.15); border-radius:7px; padding:.5rem .7rem; font-family:'Electrolize',sans-serif; font-size:.85rem; color:var(--sib-text); outline:none; width:80px; }

        /* Recipe info */
        .recipe-info { background:rgba(250,218,125,.05); border:1px solid rgba(250,218,125,.15); border-radius:10px; padding:.9rem; margin-bottom:1rem; }
        .recipe-info-title { font-family:'Rajdhani',sans-serif; font-size:.78rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--sib-gold); margin-bottom:.6rem; }

        /* Per-ingredient quality row */
        .ing-row { display:flex; align-items:center; gap:.6rem; margin-bottom:.5rem; flex-wrap:wrap; }
        .ing-name { flex:1; font-size:.85rem; color:var(--sib-text); font-weight:600; min-width:100px; }
        .ing-qty-needed { font-size:.78rem; color:var(--sib-muted); }
        .ing-stock-ok   { font-size:.78rem; color:var(--sib-green); }
        .ing-stock-nok  { font-size:.78rem; color:var(--sib-red); }
        /* Custom quality dropdown — évite les <option> non stylables sur Windows */
        .qual-dd { position:relative; display:inline-block; }
        .qual-dd-btn {
            background:#0d1226; border:1px solid rgba(250,218,125,.25);
            border-radius:7px; padding:.32rem 1.55rem .32rem .65rem;
            font-family:'Electrolize',sans-serif; font-size:.82rem; color:#DBE8FF;
            cursor:pointer; white-space:nowrap; min-width:110px; text-align:left;
            transition:border-color .2s; user-select:none; position:relative;
        }
        .qual-dd-btn::after {
            content:''; position:absolute; right:.55rem; top:50%;
            transform:translateY(-3px);
            border-left:4px solid transparent; border-right:4px solid transparent;
            border-top:5px solid #9fb6d7;
        }
        .qual-dd-btn:hover { border-color:rgba(250,218,125,.55); }
        .qual-dd-panel {
            position:absolute; right:0; top:calc(100% + 4px); z-index:500;
            background:#0d1226; border:1px solid rgba(250,218,125,.3);
            border-radius:8px; padding:.3rem 0; min-width:130px;
            box-shadow:0 10px 28px rgba(0,0,0,.7);
            display:none; max-height:260px; overflow-y:auto;
        }
        .qual-dd-panel.open { display:block; }
        .qual-dd-opt {
            padding:.3rem .8rem; font-family:'Electrolize',sans-serif; font-size:.82rem;
            color:#DBE8FF; cursor:pointer; transition:background .12s; white-space:nowrap;
        }
        .qual-dd-opt:hover { background:rgba(250,218,125,.1); color:#fada7d; }
        .qual-dd-opt.active { color:#fada7d; font-weight:600; }
        .qual-dd-sep { height:1px; background:rgba(255,255,255,.07); margin:.2rem 0; }

        /* Global quality buttons */
        .quality-pref { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:.8rem; }
        .btn-qpref { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.78rem; letter-spacing:.08em; padding:.5rem .8rem; border-radius:8px; cursor:pointer; transition:all .25s; border:1px solid var(--sib-border); color:var(--sib-muted); background:rgba(255,255,255,.03); text-align:center; }
        .btn-qpref.active-best  { border-color:rgba(79,255,176,.5);  color:var(--sib-green);  background:rgba(79,255,176,.08); }
        .btn-qpref.active-worst { border-color:rgba(255,179,71,.5);  color:var(--sib-orange); background:rgba(255,179,71,.08); }

        /* Custom ingredient rows */
        .custom-ing-row { display:flex; align-items:center; gap:.5rem; margin-bottom:.45rem; }
        .custom-ing-name { flex:1; }
        .custom-ing-name .form-input { padding:.5rem .7rem; font-size:.85rem; }
        .custom-ing-qty-wrap { width:80px; }
        .btn-remove-ing { background:rgba(255,107,107,.1); border:1px solid rgba(255,107,107,.25); color:var(--sib-red); border-radius:7px; padding:.35rem .6rem; cursor:pointer; font-size:.85rem; transition:all .2s; }
        .btn-remove-ing:hover { background:rgba(255,107,107,.2); }
        .btn-add-ing { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.8rem; letter-spacing:.08em; padding:.45rem 1rem; border-radius:8px; cursor:pointer; border:1px dashed rgba(250,218,125,.3); color:var(--sib-gold); background:none; transition:all .2s; margin-top:.3rem; }
        .btn-add-ing:hover { background:rgba(250,218,125,.05); border-color:var(--sib-gold); }

        .modal-actions { display:flex; gap:.8rem; justify-content:flex-end; margin-top:1.2rem; }
        .btn-cancel { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.9rem; letter-spacing:.1em; padding:.65rem 1.4rem; background:transparent; border:1px solid var(--sib-border); border-radius:10px; color:var(--sib-muted); cursor:pointer; transition:all .3s; }
        .btn-cancel:hover { color:var(--sib-text); border-color:rgba(255,255,255,.2); }
        .btn-submit { font-family:'Rajdhani',sans-serif; font-weight:800; font-size:.9rem; letter-spacing:.12em; padding:.65rem 1.8rem; background:linear-gradient(135deg,rgba(250,218,125,.18),rgba(250,218,125,.1)); border:1px solid var(--sib-gold); border-radius:10px; color:var(--sib-gold); cursor:pointer; transition:all .3s; }
        .btn-submit:hover { box-shadow:0 0 20px rgba(250,218,125,.25); }
        .btn-submit:disabled { opacity:.5; pointer-events:none; }

        /* Toast */
        .toast { position:fixed; bottom:2rem; right:2rem; z-index:1000; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.95rem; padding:.9rem 1.5rem; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,.4); transform:translateY(20px); opacity:0; transition:all .35s; pointer-events:none; }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast.success { background:rgba(79,255,176,.12); border:1px solid rgba(79,255,176,.4); color:var(--sib-green); }
        .toast.error   { background:rgba(255,107,107,.12); border:1px solid rgba(255,107,107,.4); color:var(--sib-red); }

        .empty-block { text-align:center; padding:3rem; color:var(--sib-muted); background:var(--sib-panel); border:1px solid var(--sib-border); border-radius:14px; }
        .empty-block .ico { font-size:2.5rem; margin-bottom:.8rem; opacity:.4; }

        @media(max-width:600px){ .page-wrapper{padding:1rem;} header{padding:0 1rem;} .craft-grid{grid-template-columns:1fr 1fr;} }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img class="header-logo" src="https://github.com/DylanParreira/sibylla-assets/blob/main/SibyllaShop.png?raw=true" alt="Sibylla">
        <div class="header-sep"></div>
        <div class="header-title">Blueprint</div>
    </div>
    <div class="header-nav">
        <a class="nav-btn nav-ghost" href="<?= appUrl ?>?page=stock&token=<?= vendeurToken ?>">📦 Stock</a>
        <span class="nav-btn nav-active">📘 Blueprint</span>
        <a class="nav-btn nav-ext" href="https://scmdb.net/?page=fab" target="_blank">🔗 SCMDB</a>
        <a class="nav-btn nav-ghost" href="<?= appUrl ?>">← Accueil</a>
    </div>
</header>

<div class="page-wrapper">
    <div class="section-header">
        <div class="section-title">Blueprints disponibles</div>
        <div class="section-legend">
            <span><span class="legend-dot" style="background:#4fffb0"></span>Réalisable</span>
            <span><span class="legend-dot" style="background:#ff6b6b"></span>Stock insuffisant</span>
        </div>
    </div>

    <div class="craft-filters">
        <div class="craft-search-wrap">
            <span class="craft-search-icon">🔍</span>
            <input class="craft-search" id="craftSearch" type="text" placeholder="Rechercher un blueprint…" oninput="applyFilters()">
        </div>
        <div class="type-filter-btns" id="typeFilterBtns">
            <button class="type-filter-btn active" onclick="setTypeFilter('', this)">Tous</button>
        </div>
    </div>

    <div class="craft-grid" id="craftGrid">
        <div style="grid-column:1/-1" class="empty-block"><div class="ico">⏳</div><p>Chargement…</p></div>
    </div>

    <div class="my-requests-section" id="myRequestsSection" style="display:none;">
        <div class="section-header" style="margin-top:2rem;">
            <div class="section-title">Mes demandes</div>
        </div>
        <div id="myRequestsList"></div>
    </div>

</div>

<!-- MODAL BLUEPRINT PRÉDÉFINI -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-title" id="modalItemName">Blueprint</div>
        <div class="modal-sub" id="modalItemDesc"></div>
        <div class="recipe-info" id="recipeInfo" style="display:none;"></div>
        <div id="modalForm">
            <div class="form-group">
                <label class="form-label">Priorité qualité globale</label>
                <div class="quality-pref">
                    <button class="btn-qpref active-best" id="btnBest" onclick="setGlobalQuality('DESC')">⬆ Meilleures qualités</button>
                    <button class="btn-qpref" id="btnWorst" onclick="setGlobalQuality('ASC')">⬇ Moindres qualités</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Qualité par matériau</label>
                <div id="ingredientQualityList"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Quantité</label>
                <input class="form-input" type="number" id="fQty" min="1" value="1" oninput="updateSubmitBtn()">
            </div>
            <div class="form-group">
                <label class="form-label">Note (optionnel)</label>
                <textarea class="form-textarea" id="fNote" placeholder="Informations supplémentaires…"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Annuler</button>
                <button class="btn-submit" id="btnSubmit" onclick="submitRequest()">Envoyer la demande</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL BLUEPRINT PERSONNALISÉ -->
<div class="modal-overlay" id="customModalOverlay">
    <div class="modal-box">
        <button class="modal-close" onclick="closeCustomModal()">✕</button>
        <div class="modal-title">Blueprint Personnalisé</div>
        <div class="modal-sub">Définissez vos propres matériaux. Le crafteur vérifiera la disponibilité.</div>

        <div class="form-group">
            <label class="form-label">Nom du Blueprint</label>
            <input class="form-input" type="text" id="cName" placeholder="Ex: Épée composite">
        </div>

        <div class="form-group">
            <label class="form-label">Matériaux requis</label>
            <div id="customIngList"></div>
            <button class="btn-add-ing" onclick="addCustomIng()">+ Ajouter un matériau</button>
        </div>

        <div class="form-group">
            <label class="form-label">Priorité qualité globale</label>
            <div class="quality-pref">
                <button class="btn-qpref active-best" id="cBtnBest" onclick="setCustomGlobalQuality('DESC')">⬆ Meilleures qualités</button>
                <button class="btn-qpref" id="cBtnWorst" onclick="setCustomGlobalQuality('ASC')">⬇ Moindres qualités</button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Note (optionnel)</label>
            <textarea class="form-textarea" id="cNote" placeholder="Précisions sur le Blueprint…"></textarea>
        </div>

        <div id="customFeasibility" style="margin-bottom:.8rem;"></div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeCustomModal()">Annuler</button>
            <button class="btn-submit" id="cBtnSubmit" onclick="submitCustomRequest()">Envoyer la demande</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const TOKEN = '<?= vendeurToken ?>';
    const CSCU_PER_SCU = 100;  // Conversion: 1 SCU = 100 cSCU
    let allItems = [];
    let selectedItem = null;
    let globalQualityPref = 'DESC';
    let customGlobalQualityPref = 'DESC';
    let stockSummary = {};
    let ingredientQualities = {}; // {resourceName: {type: 'best'|'worst'|'any'}}

    var activeTypeFilter = '';

    var TYPE_LABELS = {
        'WeaponPersonal':'Armes', 'WeaponMelee':'Corps à corps',
        'Char_Armor_Torso':'Torse', 'Char_Armor_Arms':'Bras',
        'Char_Armor_Helmet':'Casque', 'Char_Armor_Backpack':'Dos',
        'Char_Armor_Legs':'Jambes', 'Char_Armor_Undersuit':'Combinaison',
        'Char_Armor_Gloves':'Gants'
    };

    function typeLabel(t) {
        if (!t) return '';
        if (TYPE_LABELS[t]) return TYPE_LABELS[t];
        return t.replace(/^Char_Armor_/,'').replace(/_/g,' ');
    }

    window.onload = function() {
        google.script.run
            .withSuccessHandler(function(r) {
                if (r && r.enabled === false) {
                    showCraftingUnavailable();
                } else {
                    loadItems();
                    loadMyRequests();
                    loadStockSummary();
                }
            })
            .withFailureHandler(function() {
                loadItems();
                loadMyRequests();
                loadStockSummary();
            })
            .getCraftingStatus();
    };

    function showCraftingUnavailable() {
        document.querySelector('.page-wrapper').innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:2rem;position:relative;overflow:hidden;">
                <!-- Grille de fond décorative -->
                <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(64,224,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(64,224,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>

                <!-- Icône centrale -->
                <div style="position:relative;margin-bottom:2.5rem;width:120px;height:120px;">
                    <div style="position:absolute;inset:0;border-radius:50%;border:2px solid rgba(64,224,255,.15);animation:ring-spin 8s linear infinite;"></div>
                    <div style="position:absolute;inset:10px;border-radius:50%;border:1px dashed rgba(250,218,125,.2);animation:ring-spin 12s linear infinite reverse;"></div>
                    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3.2rem;filter:grayscale(.4);opacity:.7;">⚙️</div>
                </div>

                <!-- CRAFT // COMING SOON -->
                <div style="font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;color:rgba(64,224,255,.4);margin-bottom:.6rem;">
                    SIBYLLA · CRAFTING
                </div>
                <div style="font-family:'Rajdhani',sans-serif;font-size:3rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;line-height:1;margin-bottom:.5rem;
                            background:linear-gradient(135deg,#40e0ff 0%,#fada7d 60%,#4da3ff 100%);
                            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
                    COMING SOON
                </div>
                <div style="font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
                            color:rgba(159,182,215,.4);margin-bottom:2.5rem;">
                    // SERVICE EN COURS DE PRÉPARATION //
                </div>

                <!-- Bloc info -->
                <div style="max-width:460px;font-size:.9rem;color:var(--sib-muted);line-height:1.9;
                            background:rgba(64,224,255,.04);border:1px solid rgba(64,224,255,.12);
                            border-radius:14px;padding:1.5rem 2rem;position:relative;">
                    <div style="position:absolute;top:-1px;left:2rem;right:2rem;height:1px;background:linear-gradient(90deg,transparent,rgba(64,224,255,.4),transparent);"></div>
                    Le service de crafting est temporairement hors ligne.<br>
                    Il sera de retour très prochainement.<br>
                    <span style="color:var(--sib-accent1);">→ Discord Sibylla</span> pour plus d'informations.
                </div>

                <!-- Indicateur état -->
                <div style="margin-top:2.5rem;display:flex;gap:.6rem;align-items:center;">
                    <div style="width:6px;height:6px;border-radius:50%;background:#40e0ff;animation:pulse-craft 2s ease-in-out infinite;"></div>
                    <span style="font-family:'Rajdhani',sans-serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(64,224,255,.35);">EN ATTENTE D'ACTIVATION</span>
                </div>
            </div>`;
        var style = document.createElement('style');
        style.textContent = `
            @keyframes pulse-craft { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }
            @keyframes ring-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        `;
        document.head.appendChild(style);
    }

    function loadStockSummary() {
        google.script.run
            .withSuccessHandler(function(data) { if (data && data.summary) stockSummary = data.summary; })
            .withFailureHandler(function(){})
            .getStockSummary(TOKEN);
    }

    function loadItems() {
        google.script.run
            .withSuccessHandler(function(data) {
                allItems = data.items || [];
                buildTypeFilters();
                renderGrid();
            })
            .withFailureHandler(function() { document.getElementById('craftGrid').innerHTML = '<div class="empty-block"><div class="ico">❌</div><p>Erreur de chargement.</p></div>'; })
            .getCraftItemsWithStatus();
    }

    function loadMyRequests() {
        google.script.run
            .withSuccessHandler(function(data) {
                if (!data.requests || data.requests.length === 0) return;
                document.getElementById('myRequestsSection').style.display = 'block';
                renderMyRequests(data.requests);
            })
            .withFailureHandler(function(){})
            .getMyCraftRequests(TOKEN);
    }

    function renderMyRequests(requests) {
        var DONE_STATUTS = ['Crafté', 'Refusé', 'Annulé'];
        var active  = requests.filter(function(r){ return DONE_STATUTS.indexOf(r.statut) === -1; });
        var history = requests.filter(function(r){ return DONE_STATUTS.indexOf(r.statut) !== -1; });

        function buildRow(r) {
            var bc = r.statut === 'En attente'    ? 'badge-attente'
                   : r.statut === 'En discussion' ? 'badge-discussion'
                   : r.statut === 'Accepté'       ? 'badge-accepte'
                   : r.statut === 'Refusé'        ? 'badge-refuse'
                   : r.statut === 'Annulé'        ? 'badge-annule'
                   : 'badge-crafte';
            var customLabel = r.customRecipe ? ' <span style="font-size:.72rem;color:var(--sib-gold);opacity:.7">[Perso]</span>' : '';
            var noteHtml = r.noteAdmin ? '<div style="font-size:.78rem;color:var(--sib-muted);margin-top:.3rem">📝 ' + esc(r.noteAdmin) + '</div>' : '';

            var canChat = r.statut === 'En attente' || r.statut === 'En discussion' || r.statut === 'Accepté';
            var chatHtml = '';
            if (r.messages && r.messages.length > 0) {
                var msgs = r.messages.map(function(m) {
                    return '<div class="chat-msg from-' + m.from + '">' +
                        '<div class="chat-bubble">' + esc(m.text) + '</div>' +
                        '<div class="chat-meta">' + esc(m.displayName) + ' · ' + esc(m.date) + '</div>' +
                        '</div>';
                }).join('');
                chatHtml = '<div class="chat-section"><div class="chat-messages">' + msgs + '</div>';
                if (canChat) chatHtml += '<div class="chat-input-row"><input class="chat-input" id="reply-' + esc(r.id) + '" placeholder="Répondre…"><button class="btn-chat" onclick="sendReply(\'' + esc(r.id) + '\')">Envoyer</button></div>';
                chatHtml += '</div>';
            } else if (canChat) {
                chatHtml = '<div class="chat-section"><div class="chat-input-row"><input class="chat-input" id="reply-' + esc(r.id) + '" placeholder="Écrire un message au crafteur…"><button class="btn-chat" onclick="sendReply(\'' + esc(r.id) + '\')">Envoyer</button></div></div>';
            }

            // Bouton annulation uniquement sur demandes actives non craftées
            var cancelHtml = '';
            if (DONE_STATUTS.indexOf(r.statut) === -1) {
                cancelHtml = '<div style="margin-top:.4rem"><button class="btn-cancel-req" onclick="cancelReq(\'' + esc(r.id) + '\', this)">✕ Annuler ma demande</button></div>';
            }

            return '<div class="request-row">' +
                '<div class="req-header">' +
                '<div class="req-item">📘 ' + esc(r.nomItem) + ' ×' + r.quantite + customLabel + '</div>' +
                '<div class="req-date">' + esc(r.date) + '</div>' +
                '<span class="req-badge ' + bc + '">' + esc(r.statut) + '</span>' +
                '</div>' + noteHtml + chatHtml + cancelHtml + '</div>';
        }

        var activeHtml = active.length > 0
            ? active.map(buildRow).join('')
            : '<div class="empty-block"><div class="ico">📭</div><p>Aucune demande en cours.</p></div>';

        var historyHtml = '';
        if (history.length > 0) {
            historyHtml = '<div class="history-toggle" onclick="toggleHistory(this)">' +
                '<span class="history-arrow">▶</span> Historique (' + history.length + ' terminée' + (history.length > 1 ? 's' : '') + ')' +
                '</div>' +
                '<div class="history-list">' + history.map(buildRow).join('') + '</div>';
        }

        document.getElementById('myRequestsList').innerHTML = activeHtml + historyHtml;
    }

    function toggleHistory(btn) {
        var arrow = btn.querySelector('.history-arrow');
        var list  = btn.nextElementSibling;
        var open  = list.classList.toggle('open');
        arrow.classList.toggle('open', open);
    }

    function cancelReq(id, btn) {
        if (!confirm('Annuler cette demande de blueprint ?')) return;
        btn.disabled = true;
        google.script.run
            .withSuccessHandler(function(r) {
                if (r.success) { showToast('Demande annulée.', 'success'); loadMyRequests(); }
                else { showToast(r.message || 'Erreur.', 'error'); btn.disabled = false; }
            })
            .withFailureHandler(function() { showToast('Erreur serveur.', 'error'); btn.disabled = false; })
            .cancelCraftRequest(id, TOKEN);
    }

    function sendReply(id) {
        var input = document.getElementById('reply-' + id);
        if (!input || !input.value.trim()) return;
        var text = input.value.trim();
        input.disabled = true;
        google.script.run
            .withSuccessHandler(function(r) {
                if (r.success) { showToast('Message envoyé.', 'success'); loadMyRequests(); }
                else { showToast(r.message || 'Erreur.', 'error'); input.disabled = false; }
            })
            .withFailureHandler(function() { showToast('Erreur serveur.', 'error'); input.disabled = false; })
            .sendCraftMessage(id, text, TOKEN);
    }

    function setTypeFilter(type, btn) {
        activeTypeFilter = type;
        document.querySelectorAll('.type-filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderGrid();
    }

    function applyFilters() { renderGrid(); }

    function buildTypeFilters() {
        var types = {};
        allItems.forEach(function(item) { if (item.type) types[item.type] = true; });
        var btns = '<button class="type-filter-btn active" onclick="setTypeFilter(\'\',this)">Tous</button>';
        Object.keys(types).sort().forEach(function(t) {
            btns += '<button class="type-filter-btn" onclick="setTypeFilter(\'' + esc(t) + '\',this)">' + esc(typeLabel(t)) + '</button>';
        });
        document.getElementById('typeFilterBtns').innerHTML = btns;
    }

    function renderGrid() {
        var grid = document.getElementById('craftGrid');
        var q = (document.getElementById('craftSearch').value || '').toLowerCase().trim();

        var filtered = allItems.filter(function(item) {
            var matchType   = !activeTypeFilter || item.type === activeTypeFilter;
            var matchSearch = !q || item.nom.toLowerCase().indexOf(q) !== -1;
            return matchType && matchSearch;
        });

        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1" class="empty-block"><div class="ico">📘</div><p>' +
                (allItems.length === 0 ? 'Aucun blueprint activé. Configurez-les dans le panel admin.' : 'Aucun résultat.') +
                '</p></div>';
            var cardsHtml2 = '<div class="custom-card" onclick="openCustomModal()"><div class="custom-card-icon">✏️</div><div class="custom-card-label">Blueprint Personnalisé</div><div class="custom-card-sub">Créez votre propre recette</div></div>';
            grid.innerHTML += cardsHtml2;
            return;
        }

        var cardsHtml = filtered.map(function(item) {
            var cls = item.craftable ? 'craftable' : 'uncraftable';
            var statusHtml = item.craftable
                ? '<span class="craft-status status-ok">✓ Réalisable</span>'
                : '<span class="craft-status status-no">✗ Stock insuffisant</span>';
            var typeBadge = item.type ? '<span class="craft-type-badge">' + esc(typeLabel(item.type)) + '</span>' : '';
            var recipeTags = (item.recipe || []).map(function(r) {
                var avail = stockSummary[r.resource.toLowerCase()] || 0;
                var ok = r.qty > 0 && avail >= r.qty * CSCU_PER_SCU;
                var qtyStr = r.qty > 0 ? ' ×' + fmtQty(r.qty) + ' SCU' : '';
                return '<span class="recipe-tag ' + (ok ? 'ok' : 'nok') + '">' + esc(r.resource) + qtyStr + '</span>';
            }).join('');
            var mins = item.craftTime > 0 ? Math.round(item.craftTime / 60) : 0;
            var timeStr = mins > 0 ? '<div class="craft-card-time">⏱ ' + mins + ' min</div>' : '';
            return '<div class="craft-card ' + cls + '" onclick="openModal(\'' + esc(item.id) + '\')">' +
                '<div class="craft-card-body">' +
                '<div class="craft-card-top"><div class="craft-card-name">' + esc(item.nom) + '</div>' + typeBadge + '</div>' +
                statusHtml +
                (recipeTags ? '<div class="recipe-preview">' + recipeTags + '</div>' : '') +
                timeStr +
                '</div></div>';
        }).join('');

        cardsHtml += '<div class="custom-card" onclick="openCustomModal()"><div class="custom-card-icon">✏️</div><div class="custom-card-label">Blueprint Personnalisé</div><div class="custom-card-sub">Créez votre propre recette</div></div>';
        grid.innerHTML = cardsHtml;
    }

    // ===== MODAL BLUEPRINT PRÉDÉFINI =====

    function openModal(itemId) {
        selectedItem = allItems.find(function(x) { return String(x.id) === String(itemId); });
        if (!selectedItem) return;
        ingredientQualities = {};

        document.getElementById('modalItemName').textContent = selectedItem.nom;
        document.getElementById('modalItemDesc').textContent = selectedItem.description || '';

        // Recipe
        var recipeEl = document.getElementById('recipeInfo');
        if (selectedItem.recipe.length > 0) {
            var recipeHtml = '<div class="recipe-info-title">Ressources nécessaires (×1)</div>';
            selectedItem.recipe.forEach(function(r) {
                var avail = stockSummary[r.resource.toLowerCase()] || 0;
                var ok = avail >= r.qty * CSCU_PER_SCU;
                recipeHtml += '<div style="font-size:.85rem;color:' + (ok ? 'var(--sib-green)' : 'var(--sib-red)') + ';margin-bottom:.15rem">' +
                    (ok ? '✓' : '✗') + ' ' + esc(r.resource) + ' — ' + fmtQty(r.qty) + ' SCU (dispo: ' + fmtQty(avail) + ')</div>';
            });
            recipeEl.innerHTML = recipeHtml;
            recipeEl.style.display = 'block';
        } else {
            recipeEl.style.display = 'none';
        }

        // Per-ingredient quality
        buildIngredientQualityUI(selectedItem.recipe);
        setGlobalQuality('DESC');

        document.getElementById('fQty').value = 1;
        document.getElementById('fNote').value = '';
        updateSubmitBtn();

        document.getElementById('modalOverlay').classList.add('active');
    }

    // ===== DROPDOWN QUALITÉ CUSTOM =====
    var _QUAL_OPTS = [
        {v:'best',  l:'⬆ Meilleure'}, {sep:true},
        {v:'950',   l:'950+'}, {v:'900', l:'900+'}, {v:'850', l:'850+'},
        {v:'800',   l:'800+'}, {v:'750', l:'750+'}, {v:'700', l:'700+'},
        {v:'650',   l:'650+'}, {v:'600', l:'600+'}, {v:'550', l:'550+'},
        {v:'500',   l:'500+'}, {sep:true},
        {v:'worst', l:'⬇ Moindre'}, {v:'any', l:'~ Indifférent'}
    ];

    function _qualLabel(v) {
        for (var i = 0; i < _QUAL_OPTS.length; i++) {
            if (_QUAL_OPTS[i].v === v) return _QUAL_OPTS[i].l;
        }
        return v;
    }

    function _buildQualDD(resource, initVal) {
        var rid = resource.replace(/[^a-zA-Z0-9_-]/g, '_');
        var opts = _QUAL_OPTS.map(function(o) {
            if (o.sep) return '<div class="qual-dd-sep"></div>';
            return '<div class="qual-dd-opt' + (o.v === initVal ? ' active' : '') + '" ' +
                   'onmousedown="selectQualOpt(\'' + esc(resource) + '\',\'' + o.v + '\')">' + o.l + '</div>';
        }).join('');
        return '<div class="qual-dd" id="qdd-' + rid + '">' +
               '<div class="qual-dd-btn" onmousedown="toggleQualDD(\'' + esc(resource) + '\',event)">' +
               '<span id="qdd-lbl-' + rid + '">' + _qualLabel(initVal) + '</span>' +
               '</div>' +
               '<div class="qual-dd-panel" id="qdd-panel-' + rid + '">' + opts + '</div>' +
               '</div>';
    }

    function toggleQualDD(resource, e) {
        e.preventDefault(); e.stopPropagation();
        var rid = resource.replace(/[^a-zA-Z0-9_-]/g, '_');
        var panel = document.getElementById('qdd-panel-' + rid);
        if (!panel) return;
        var wasOpen = panel.classList.contains('open');
        // ferme tous
        document.querySelectorAll('.qual-dd-panel.open').forEach(function(p) { p.classList.remove('open'); });
        if (!wasOpen) panel.classList.add('open');
    }

    function selectQualOpt(resource, value) {
        var rid = resource.replace(/[^a-zA-Z0-9_-]/g, '_');
        var lbl   = document.getElementById('qdd-lbl-' + rid);
        var panel = document.getElementById('qdd-panel-' + rid);
        if (lbl) lbl.textContent = _qualLabel(value);
        if (panel) {
            panel.querySelectorAll('.qual-dd-opt').forEach(function(el) {
                el.classList.toggle('active', el.textContent.trim() === _qualLabel(value));
            });
            panel.classList.remove('open');
        }
        updateIngQual(resource, value);
    }

    // Ferme les dropdowns si clic en dehors
    document.addEventListener('mousedown', function(e) {
        if (!e.target.closest || !e.target.closest('.qual-dd')) {
            document.querySelectorAll('.qual-dd-panel.open').forEach(function(p) { p.classList.remove('open'); });
        }
    });

    function buildIngredientQualityUI(recipe) {
        var container = document.getElementById('ingredientQualityList');
        if (!recipe || recipe.length === 0) { container.innerHTML = '<div style="font-size:.82rem;color:var(--sib-muted)">Aucun matériau défini.</div>'; return; }

        var html = recipe.map(function(r) {
            var avail = stockSummary[r.resource.toLowerCase()] || 0;
            var stockInfo = avail >= r.qty
                ? '<span class="ing-stock-ok">✓ ' + avail + ' dispo</span>'
                : '<span class="ing-stock-nok">✗ ' + avail + ' dispo</span>';
            return '<div class="ing-row">' +
                '<span class="ing-name">' + esc(r.resource) + '</span>' +
                '<span class="ing-qty-needed">×' + fmtQty(r.qty) + ' SCU</span>' +
                stockInfo +
                _buildQualDD(r.resource, 'best') +
                '</div>';
        }).join('');
        container.innerHTML = html;
        recipe.forEach(function(r) { ingredientQualities[r.resource.toLowerCase()] = { type: 'best' }; });
    }

    function updateIngQual(resource, value) {
        ingredientQualities[resource.toLowerCase()] = { type: value };
    }

    function setGlobalQuality(pref) {
        globalQualityPref = pref;
        document.getElementById('btnBest').className  = 'btn-qpref' + (pref === 'DESC' ? ' active-best'  : '');
        document.getElementById('btnWorst').className = 'btn-qpref' + (pref === 'ASC'  ? ' active-worst' : '');
        if (selectedItem && selectedItem.recipe) {
            var type = pref === 'DESC' ? 'best' : 'worst';
            selectedItem.recipe.forEach(function(r) { selectQualOpt(r.resource, type); });
        }
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        selectedItem = null;
    }

    function updateSubmitBtn() {
        if (!selectedItem) return;
        var qty = parseInt(document.getElementById('fQty').value) || 1;
        var canCraft = true;
        if (selectedItem.recipe && selectedItem.recipe.length > 0) {
            canCraft = selectedItem.recipe.every(function(r) {
                return (stockSummary[r.resource.toLowerCase()] || 0) >= r.qty * qty * CSCU_PER_SCU;
            });
        }
        var btn = document.getElementById('btnSubmit');
        btn.disabled = !canCraft;
        btn.textContent = canCraft ? 'Envoyer la demande' : 'Stock insuffisant';
    }

    function submitRequest() {
        if (!selectedItem) return;
        var qty = parseInt(document.getElementById('fQty').value) || 1;
        var btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.textContent = '⏳ Envoi…';

        google.script.run
            .withSuccessHandler(function(result) {
                if (result.success) {
                    showToast('Demande envoyée !', 'success');
                    closeModal(); loadMyRequests();
                    document.getElementById('myRequestsSection').style.display = 'block';
                } else {
                    showToast(result.message || 'Erreur.', 'error');
                    btn.disabled = false; btn.textContent = 'Envoyer la demande';
                }
            })
            .withFailureHandler(function() {
                showToast('Erreur serveur.', 'error');
                btn.disabled = false; btn.textContent = 'Envoyer la demande';
            })
            .submitCraftRequest({
                craftItemId:       selectedItem.id,
                nomItem:           selectedItem.nom,
                quantite:          qty,
                note:              document.getElementById('fNote').value.trim(),
                prioriteQualite:   globalQualityPref,
                qualitesChoisies:  ingredientQualities
            }, TOKEN);
    }

    // ===== MODAL BLUEPRINT PERSONNALISÉ =====

    var customIngCount = 0;

    function openCustomModal() {
        document.getElementById('cName').value = '';
        document.getElementById('cNote').value = '';
        document.getElementById('customIngList').innerHTML = '';
        document.getElementById('customFeasibility').innerHTML = '';
        customIngCount = 0;
        setCustomGlobalQuality('DESC');
        addCustomIng(); // Add one row by default
        document.getElementById('customModalOverlay').classList.add('active');
    }

    function closeCustomModal() {
        document.getElementById('customModalOverlay').classList.remove('active');
    }

    function addCustomIng() {
        customIngCount++;
        var id = 'cing-' + customIngCount;
        var qualDDId = 'cqdd-' + customIngCount;
        var row = document.createElement('div');
        row.className = 'custom-ing-row';
        row.id = id;
        row.innerHTML = '<div class="custom-ing-name"><input class="form-input" type="text" placeholder="Nom du matériau" oninput="checkCustomFeasibility()"></div>' +
            '<div class="custom-ing-qty-wrap"><input class="form-input-sm" type="number" min="1" value="1" placeholder="Qté" oninput="checkCustomFeasibility()"></div>' +
            _buildCustomQualDD(qualDDId, 'best') +
            '<button class="btn-remove-ing" onclick="removeCustomIng(\'' + id + '\')">✕</button>';
        document.getElementById('customIngList').appendChild(row);
    }

    function _buildCustomQualDD(ddId, initVal) {
        var opts = _QUAL_OPTS.map(function(o) {
            if (o.sep) return '<div class="qual-dd-sep"></div>';
            return '<div class="qual-dd-opt' + (o.v === initVal ? ' active' : '') + '" ' +
                   'onmousedown="selectCustomQualOpt(\'' + ddId + '\',\'' + o.v + '\')">' + o.l + '</div>';
        }).join('');
        return '<div class="qual-dd" id="' + ddId + '-wrap" data-qual="' + initVal + '">' +
               '<div class="qual-dd-btn" onmousedown="toggleCustomQualDD(\'' + ddId + '\',event)">' +
               '<span id="' + ddId + '-lbl">' + _qualLabel(initVal) + '</span>' +
               '</div>' +
               '<div class="qual-dd-panel" id="' + ddId + '-panel">' + opts + '</div>' +
               '</div>';
    }

    function toggleCustomQualDD(ddId, e) {
        e.preventDefault(); e.stopPropagation();
        var panel = document.getElementById(ddId + '-panel');
        if (!panel) return;
        var wasOpen = panel.classList.contains('open');
        document.querySelectorAll('.qual-dd-panel.open').forEach(function(p) { p.classList.remove('open'); });
        if (!wasOpen) panel.classList.add('open');
    }

    function selectCustomQualOpt(ddId, value) {
        var wrap  = document.getElementById(ddId + '-wrap');
        var lbl   = document.getElementById(ddId + '-lbl');
        var panel = document.getElementById(ddId + '-panel');
        if (wrap)  wrap.dataset.qual = value;
        if (lbl)   lbl.textContent = _qualLabel(value);
        if (panel) {
            panel.querySelectorAll('.qual-dd-opt').forEach(function(el) {
                el.classList.toggle('active', el.textContent.trim() === _qualLabel(value));
            });
            panel.classList.remove('open');
        }
    }

    function removeCustomIng(id) {
        var el = document.getElementById(id);
        if (el) el.remove();
        checkCustomFeasibility();
    }

    function setCustomGlobalQuality(pref) {
        customGlobalQualityPref = pref;
        document.getElementById('cBtnBest').className  = 'btn-qpref' + (pref === 'DESC' ? ' active-best'  : '');
        document.getElementById('cBtnWorst').className = 'btn-qpref' + (pref === 'ASC'  ? ' active-worst' : '');
        var type = pref === 'DESC' ? 'best' : 'worst';
        document.querySelectorAll('#customIngList .qual-dd[id]').forEach(function(wrap) {
            var ddId = wrap.id.replace('-wrap','');
            selectCustomQualOpt(ddId, type);
        });
    }

    function getCustomIngredients() {
        var rows = document.querySelectorAll('#customIngList .custom-ing-row');
        var ings = [];
        rows.forEach(function(row) {
            var nameInput = row.querySelector('input[type="text"]');
            var qtyInput  = row.querySelector('input[type="number"]');
            var qualWrap  = row.querySelector('.qual-dd');
            if (nameInput && nameInput.value.trim() && qtyInput) {
                ings.push({
                    resource: nameInput.value.trim(),
                    qty: parseInt(qtyInput.value) || 1,
                    qualite: qualWrap ? (qualWrap.dataset.qual || 'best') : 'best'
                });
            }
        });
        return ings;
    }

    function checkCustomFeasibility() {
        var ings = getCustomIngredients();
        var el = document.getElementById('customFeasibility');
        if (ings.length === 0) { el.innerHTML = ''; return; }
        var html = '<div style="background:rgba(255,255,255,.03);border:1px solid var(--sib-border);border-radius:8px;padding:.7rem .9rem;">' +
            '<div style="font-family:Rajdhani,sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sib-muted);margin-bottom:.4rem">Vérification stock</div>';
        ings.forEach(function(ing) {
            var avail = stockSummary[ing.resource.toLowerCase()] || 0;
            var ok = avail >= ing.qty;
            html += '<div style="font-size:.83rem;color:' + (ok ? 'var(--sib-green)' : 'var(--sib-red)') + ';margin-bottom:.15rem">' +
                (ok ? '✓' : '✗') + ' ' + esc(ing.resource) + ' ×' + ing.qty + ' <span style="opacity:.6">(dispo: ' + avail + ')</span></div>';
        });
        html += '</div>';
        el.innerHTML = html;
    }

    function submitCustomRequest() {
        var name = document.getElementById('cName').value.trim();
        var ings = getCustomIngredients();
        if (!name) { showToast('Donnez un nom au Blueprint.', 'error'); return; }
        if (ings.length === 0) { showToast('Ajoutez au moins un matériau.', 'error'); return; }

        var qualitesChoisies = {};
        ings.forEach(function(ing) { qualitesChoisies[ing.resource.toLowerCase()] = { type: ing.qualite }; });

        var btn = document.getElementById('cBtnSubmit');
        btn.disabled = true; btn.textContent = '⏳ Envoi…';

        google.script.run
            .withSuccessHandler(function(result) {
                if (result.success) {
                    showToast('Blueprint envoyé !', 'success');
                    closeCustomModal(); loadMyRequests();
                    document.getElementById('myRequestsSection').style.display = 'block';
                } else {
                    showToast(result.message || 'Erreur.', 'error');
                }
                btn.disabled = false; btn.textContent = 'Envoyer la demande';
            })
            .withFailureHandler(function() {
                showToast('Erreur serveur.', 'error');
                btn.disabled = false; btn.textContent = 'Envoyer la demande';
            })
            .submitCraftRequest({
                craftItemId:       '',
                nomItem:           name,
                quantite:          1,
                note:              document.getElementById('cNote').value.trim(),
                prioriteQualite:   customGlobalQualityPref,
                customRecipe:      ings,
                qualitesChoisies:  qualitesChoisies
            }, TOKEN);
    }

    function showToast(msg, type) {
        var t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast ' + (type || 'success'); t.classList.add('show');
        clearTimeout(t._t); t._t = setTimeout(function() { t.classList.remove('show'); }, 3000);
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtQty(q) {
        var n = parseFloat(q);
        if (isNaN(n) || n === 0) return '0';
        return parseFloat(n.toFixed(2)).toString();
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.getElementById('customModalOverlay').addEventListener('click', function(e) { if (e.target === this) closeCustomModal(); });

</script>
</body>
</html>
